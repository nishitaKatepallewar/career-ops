# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- SWE New Grad / Entry Level --
    - "New Grad"
    - "Graduate"
    - "University Graduate"
    - "Graduate 2026"
    - "Entry Level"
    - "Campus"
    - "Emerging Talent"
    # -- Engineering roles --
    - "Software Engineer"
    - "Backend"
    - "Full Stack"
    - "Full-Stack"
    - "Fullstack"
    # -- Forward Deployed / Applied AI --
    - "Forward Deployed"
    - "FDE"
    - "Deployed Engineer"
    - "Applied AI"
    - "AI Engineer"
    - "Solutions Engineer"
    - "ML Engineer"
    # -- AI/ML Engineer roles --
    - "ML Engineer"
    - "Machine Learning Engineer"
    - "Research Engineer"
    # -- Associate / Early Career --
    - "Associate"
    - "Early Career"
    - "University Graduate 2026"
    # -- General tech keywords --
    - "AI"
    - "Platform Engineer"
    - "Infrastructure"
    - "Systems"
    - "Developer"
  negative:
    - "Senior"
    - "Sr."
    - "Sr "
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"
    - "VP,"
    - "Manager"
    - "Intern"
    - "Internship"
    - ".NET"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
