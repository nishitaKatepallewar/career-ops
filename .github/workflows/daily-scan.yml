name: Daily Scan

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run scan
        env:
          CAREER_OPS_PORTALS: portals.yml
        run: node scan.mjs

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node telegram-notify.mjs

      - name: Commit scan results
        run: |
          git config user.name "career-ops-bot"
          git config user.email "bot@career-ops.local"
          git add data/pipeline.md data/scan-history.tsv
          git diff --staged --quiet || git commit -m "chore: daily scan results $(date +%Y-%m-%d)"
          git push
